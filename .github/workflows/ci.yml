name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  test:
    name: PHP ${{ matrix.php }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        php: ["8.1", "8.2", "8.3"]

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: lefuel_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP ${{ matrix.php }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: mbstring, pdo, pdo_mysql, xml
          coverage: none

      - name: Cache Composer packages
        uses: actions/cache@v4
        with:
          path: fuel/vendor
          key: ${{ runner.os }}-php-${{ matrix.php }}-${{ hashFiles('composer.json') }}
          restore-keys: |
            ${{ runner.os }}-php-${{ matrix.php }}-

      - name: Install dependencies
        run: composer install --no-scripts --prefer-dist --no-progress

      - name: Copy env
        run: cp .env.example .env

      - name: Run tests
        run: |
          if [ -d fuel/app/tests ]; then
            ./fuel/vendor/bin/phpunit --testdox fuel/app/tests
          else
            echo "No tests found yet — skipping."
          fi
        env:
          FUEL_ENV: test
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_DATABASE: lefuel_test
          DB_USERNAME: root
          DB_PASSWORD: root
