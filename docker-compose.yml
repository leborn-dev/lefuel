services:
  app:
    build: .
    ports:
      - "8000:8000"
    environment:
      FUEL_ENV: development
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: lefuel
      DB_USERNAME: lefuel
      DB_PASSWORD: secret
    volumes:
      - .:/app
    depends_on:
      mysql:
        condition: service_healthy

  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: rootsecret
      MYSQL_DATABASE: lefuel
      MYSQL_USER: lefuel
      MYSQL_PASSWORD: secret
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mysql_data:
